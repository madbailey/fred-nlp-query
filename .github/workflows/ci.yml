name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Regression snapshot gate
        run: python tests/evals/regression_gate.py --summary-out regression-gate-summary.md

      - name: Publish regression summary
        if: always()
        run: |
          if [ -f regression-gate-summary.md ]; then
            cat regression-gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Unit tests
        run: python -m pytest -q
